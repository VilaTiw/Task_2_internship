<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-4 text-center">Login</h2>
                    <form method="post">
                        {% csrf_token %}
                        <!-- Django forms as_p doesn't look great by default, but card-body helps -->
                        <div class="mb-3">
                            {{ form.as_p }}
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-3 shadow-sm">Log in</button>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="mb-1"><a href="{% url 'password_reset' %}" class="text-decoration-none text-muted small">Forgot your password?</a></p>
                        <p class="mb-0">Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none fw-bold">Register</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
