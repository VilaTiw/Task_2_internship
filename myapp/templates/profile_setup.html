<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <!-- Progress Bar -->
            <div class="progress mb-4" style="height: 10px;">
                <div class="progress-bar progress-bar-striped progress-bar-animated bg-success"
                     role="progressbar" style="width: 90%;" aria-valuenow="90" aria-valuemin="0" aria-valuemax="100"></div>
            </div>

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold display-6">Almost done! 🚀</h2>
                        <p class="text-muted lead">
                            Hello, <span class="text-primary fw-bold">{{ user.username }}</span>!
                            Just a few more details to help our AI write a cool description for you.
                        </p>
                    </div>

                    <form method="post" class="needs-validation">
                        {% csrf_token %}

                        <div class="bg-light p-4 rounded-3 mb-4">
                            <h5 class="mb-3 text-secondary border-bottom pb-2">Profile Details</h5>
                            {{ form.as_p }}
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm py-3">
                                Save and continue ➔
                            </button>
                        </div>
                    </form>
                </div>

                <div class="card-footer bg-white border-0 text-center pb-4">
                    <small class="text-muted">You can always edit this information later in your settings.</small>
                </div>
            </div>
        </div>
    </div>
</div>
