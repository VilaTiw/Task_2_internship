{% load socialaccount %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.10.5/font/bootstrap-icons.min.css">

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-4 text-center">Create Account</h2>

                    <form method="post">
                        {% csrf_token %}
                        <h5 class="text-secondary mb-3">Account details</h5>
                        <div class="mb-4">
                            {{ user_form.as_p }}
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 shadow-sm mb-4">Register</button>
                    </form>

                    <div class="position-relative my-4">
                        <hr>
                        <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted small">Or use another method</span>
                    </div>

                    <a href="{% provider_login_url 'github' %}" class="btn btn-dark w-100 py-2 d-flex align-items-center justify-content-center shadow-sm">
                        <i class="bi bi-github me-2"></i> Log in with GitHub
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
